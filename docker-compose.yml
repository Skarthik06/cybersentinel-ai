networks:
  cybersentinel-net:
    driver: bridge

volumes:
  postgres_data:
  chromadb_data:
  kafka_data:
  redis_data:
  grafana_data:

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE LAYER
  # ─────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cybersentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [cybersentinel-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10 2>/dev/null || zookeeper-shell localhost:2181 ls / 2>/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cybersentinel-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [cybersentinel-net]
    restart: unless-stopped
    command: >
      bash -c "
        (zookeeper-shell zookeeper:2181 delete /brokers/ids/1 2>/dev/null || true) &&
        /etc/confluent/docker/run
      "
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: cybersentinel-postgres
    environment:
      POSTGRES_DB: cybersentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [cybersentinel-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d cybersentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cybersentinel-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [cybersentinel-net]

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: cybersentinel-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER: AUTHORIZATION
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_TOKEN}
    networks: [cybersentinel-net]

  # ─────────────────────────────────────────
  # CORE SERVICES
  # ─────────────────────────────────────────

  dpi-sensor:
    build:
      context: .
      dockerfile: docker/Dockerfile.dpi
    container_name: cybersentinel-dpi
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP: localhost:9092
      REDIS_URL: redis://:${REDIS_PASSWORD}@localhost:6379
      POSTGRES_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@localhost:5432/cybersentinel
      # auto = DPI sensor will enumerate interfaces and pick the physical adapter
      # (eth0 / Ethernet in WSL2 mirrored mode = Windows host physical NIC)
      CAPTURE_INTERFACE: "auto"
      # Exclude Docker-internal and WSL2 virtual traffic — keep real host network traffic
      # 192.168.65.0/24 = Docker Desktop management
      # 172.17-21.0.0/16 = Docker bridge networks (container-to-container)
      BPF_FILTER: "ip and not (net 192.168.65.0/24) and not (net 172.17.0.0/16 or net 172.18.0.0/16 or net 172.19.0.0/16 or net 172.20.0.0/16 or net 172.21.0.0/16)"
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  rlm-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.rlm
    container_name: cybersentinel-rlm
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      POSTGRES_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/cybersentinel
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      # Threshold tuned to all-MiniLM-L6-v2 score range for behavioral profiles vs threat sigs
      # Measured similarity for known-bad profiles: 0.43–0.55 → threshold set to 0.40
      RLM_ANOMALY_THRESHOLD: "0.40"
      RLM_THREAT_MATCH_THRESHOLD: "0.35"
    networks: [cybersentinel-net]
    depends_on:
      kafka:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  threat-intel-scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    container_name: cybersentinel-scraper
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      POSTGRES_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/cybersentinel
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSEIPDB_KEY: ${ABUSEIPDB_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
    networks: [cybersentinel-net]
    depends_on:
      kafka:
        condition: service_healthy
      chromadb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mcp-orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: cybersentinel-mcp
    ports:
      - "3000:3000"
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      POSTGRES_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/cybersentinel
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ABUSEIPDB_KEY: ${ABUSEIPDB_KEY:-}
      SLACK_WEBHOOK: ${SLACK_WEBHOOK:-}
      PAGERDUTY_KEY: ${PAGERDUTY_KEY:-}
    networks: [cybersentinel-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cybersentinel-api
    ports:
      - "8080:8080"
    environment:
      PYTHONPATH: /app
      POSTGRES_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/cybersentinel
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      N8N_URL: ${N8N_URL:-http://host.docker.internal:5678}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
    networks: [cybersentinel-net]
    depends_on: [postgres, redis, chromadb]
    restart: unless-stopped

  # ─────────────────────────────────────────
  # TRAFFIC SIMULATOR
  # ─────────────────────────────────────────

  traffic-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    container_name: cybersentinel-simulator
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      # Events per minute — 2 = 1 event every 30 seconds
      SIMULATION_RATE: "2"
    networks: [cybersentinel-net]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # OBSERVABILITY LAYER
  # ─────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.2.0
    container_name: cybersentinel-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana:/etc/grafana/provisioning
    networks: [cybersentinel-net]
    depends_on: [postgres]

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cybersentinel-frontend
    ports:
      - "5173:5173"
    networks: [cybersentinel-net]
    depends_on: [api-gateway]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: cybersentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    networks: [cybersentinel-net]
