groups:
  - name: cybersentinel_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CyberSentinel service {{ $labels.job }} is down"

      - alert: HighAlertVolume
        expr: rate(cybersentinel_alerts_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Alert volume spike — possible attack in progress"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag too high — services may be falling behind"
